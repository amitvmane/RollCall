<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="RollCall"/>
  <title>RollCall</title>
  <link rel="icon" href="/web/logo.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/web/icon-192.png"/>
  <!-- manifest set dynamically by app.js once group token is known -->
  <script>
  (function(){
    var p=localStorage.getItem("rc_dark");
    var sys=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;
    if(p==="1"||(p!=="0"&&sys))document.documentElement.classList.add("dark");
  })();
  </script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/web/style.css"/>
</head>
<body>
<div id="tg-offline-bar" class="tg-offline-bar hidden" role="alert">
  ⚠️ <strong>Bot is offline</strong> — web voting still works, but Telegram notifications may be delayed.
  <button class="tg-offline-close" onclick="this.parentElement.classList.add('hidden')">✕</button>
</div>
<div id="app">
  <!-- Brand bar — hidden in TG Mini App mode (body.tg-mode) -->
  <div class="brand-bar" id="brand-bar">
    <div class="brand-inner">
      <img src="/web/logo.svg" alt="RollCall" class="brand-logo" width="28" height="28"/>
      <span class="brand-name">RollCall</span>
      <span id="presence-badge" class="presence-badge hidden"></span>
    </div>
    <div class="brand-actions">
      <button class="brand-notify-btn hidden" id="notify-btn" title="Get notified when a rollcall opens" onclick="toggleNotifications()">🔔</button>
      <button class="brand-theme-btn" id="theme-btn" title="Toggle dark mode" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <div id="loading" class="center">
    <div class="spinner"></div>
    <p style="color:var(--sub);font-size:.9rem">Loading…</p>
  </div>
  <div id="error-screen" class="center hidden">
    <div style="font-size:2.5rem">⚠️</div>
    <p id="error-msg" style="color:var(--sub)">Something went wrong.</p>
    <button id="retry-btn" class="btn btn-primary" style="margin-top:8px">Retry</button>
  </div>
  <div id="main" class="hidden">
    <!-- Tabs (multi-rollcall group mode) -->
    <div id="tab-card" class="card hidden">
      <div id="tab-bar" class="tab-bar"></div>
    </div>

    <!-- Rollcall header -->
    <div class="card">
      <div class="hdr-row">
        <h1 id="rc-title" class="rc-title">RollCall</h1>
        <span id="count-badge" class="count-badge"></span>
      </div>
      <div id="rc-meta" class="meta"></div>
      <div id="cap-row" class="cap-row hidden">
        <div class="cap-bar"><div id="cap-fill" class="cap-fill" style="width:0%"></div></div>
        <span id="cap-text" class="cap-text"></span>
      </div>
      <div style="margin-top:10px">
        <button class="copy-btn" onclick="copyPageLink()">🔗 Copy link to share</button>
      </div>
    </div>

    <!-- No active rollcalls -->
    <div id="no-rollcalls" class="card hidden">
      <div class="no-rc"><div class="icon">📋</div>
        <p>No active rollcalls right now.</p>
        <p style="margin-top:6px;font-size:.8rem">Check back later or ask an admin to start one.</p>
      </div>
    </div>

    <!-- Upcoming scheduled rollcalls -->
    <div id="upcoming-card" class="card hidden"></div>

    <!-- Identity -->
    <div class="card" id="identity-card">
      <div id="name-input-row" class="hidden">
        <div style="font-size:.78rem;font-weight:600;color:var(--sub);margin-bottom:8px">Enter your name to vote</div>
        <div class="name-row">
          <input id="name-input" type="text" placeholder="Your name" maxlength="64" autocomplete="given-name"/>
          <button class="btn btn-primary" id="name-save-btn" style="padding:10px 16px;font-size:.9rem">OK</button>
        </div>
      </div>
      <div id="name-tag-row" class="hidden">
        <div class="id-inner">
          <span class="id-badge" id="id-badge"></span>
          <div class="id-actions">
            <button class="id-change" id="name-change-btn" title="Change name">✎ Change</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Vote card -->
    <div class="card" id="vote-card">
      <div id="vote-status-row"></div>
      <div id="vote-hint" class="vote-hint" style="display:none">Tap to vote ↓</div>
      <div id="comment-row" class="comment-row hidden">
        <input id="comment-input" class="comment-input" type="text" placeholder="Add a note… (optional)" maxlength="100"/>
      </div>
      <div class="vote-row">
        <button class="vote-btn in"    data-vote="in"    id="btn-in"   ><span class="vb-icon">✅</span><span class="vb-label">IN</span></button>
        <button class="vote-btn out"   data-vote="out"   id="btn-out"  ><span class="vb-icon">❌</span><span class="vb-label">OUT</span></button>
        <button class="vote-btn maybe" data-vote="maybe" id="btn-maybe"><span class="vb-icon">🤔</span><span class="vb-label">MAYBE</span></button>
      </div>
    </div>

    <!-- Lists -->
    <div class="card" id="lists-card">
      <div id="lists-container"></div>
    </div>
    <div class="refresh-bar-wrap">
      <div class="refresh-bar"><div id="refresh-fill" class="refresh-fill"></div></div>
      <span id="refresh-label" class="refresh-label"></span>
    </div>

    <!-- Stats card — group mode only, lazy-loaded after identity is known -->
    <div id="stats-card" class="card hidden"></div>
  </div>
</div>
<div class="toast-local" id="toast-local" role="alert" aria-live="assertive" aria-atomic="true"></div>

<script src="/web/app.js"></script>
</body>
</html>

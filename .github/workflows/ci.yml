name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      # Prevent infinite loop: version bumps committed by this workflow
      # only touch version.json, so skip CI for those commits.
      - 'rollCall/version.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 rollCall/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --extend-ignore=E501,W503,E302,E303,W291,W293,W292 \
            --count --statistics || true
        # '|| true' so lint warnings don't block merge — review output manually

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rollcall-bot:ci .

  version-bump:
    name: Auto-bump version.json
    # Only run on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ test ]          # Only bump if ALL test matrix jobs passed
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to push the version commit back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # GH_PAT is a repo-scoped Personal Access Token stored as a secret.
          # It carries owner rights and can bypass branch protection rules,
          # which GITHUB_TOKEN cannot do on personal repos.
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: python scripts/bump_version.py

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rollCall/version.json
          # Exit 0 gracefully if nothing to commit (idempotent)
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: auto-bump version [skip ci]"
          git push

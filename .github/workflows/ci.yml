name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  test:
    name: Run Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (locked)
        run: pip install -r requirements.lock pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 rollCall/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --extend-ignore=E501,W503,E302,E303,W291,W293,W292 \
            --count --statistics || true
        # '|| true' so lint warnings don't block merge — review output manually

  smoke:
    name: Smoke (real-import boot check)
    runs-on: ubuntu-latest
    # Runs the production import chain against the REAL pinned dependencies
    # (no test mocks). Catches signature mismatches like the v7.8
    # use_class_middlewares=True TypeError that unit tests can't surface
    # because they mock telebot away.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-smoke-${{ hashFiles('requirements.lock') }}

      - name: Install runtime dependencies (locked)
        run: pip install -r requirements.lock

      - name: Run smoke test
        env:
          TELEGRAM_TOKEN: "123:ci-smoke"
        run: python scripts/smoke_test.py

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t rollcall-bot:ci .
